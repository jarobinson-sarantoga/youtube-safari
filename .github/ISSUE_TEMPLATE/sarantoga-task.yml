name: Sarantoga task
description: Work item for the sarantoga automation queue
title: "[sarantoga] "
labels:
  - sarantoga:ready
body:
  - type: markdown
    attributes:
      value: |
        This issue will be picked up by `sarantoga youtube-safari ingest`.
        Remove `sarantoga:ready` or add `sarantoga:in-progress` manually if you want to hold it.
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should the cloud agent implement?
      placeholder: Fix sidebar feed refresh when Safari cookies expire
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Constraints, files, acceptance criteria
      placeholder: Must pass Ubuntu verify and macos-latest mac-audit (scripts/audit.sh). Preserve IINA launch guardrails in AGENTS.md.
    validations:
      required: false
