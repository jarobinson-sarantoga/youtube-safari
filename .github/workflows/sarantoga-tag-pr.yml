name: Sarantoga tag PR

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  tag:
    if: startsWith(github.head_ref, 'cursor/')
    runs-on: ubuntu-latest
    steps:
      - run: gh pr edit ${{ github.event.pull_request.number }} --add-label sarantoga
        env:
          GH_TOKEN: ${{ github.token }}
