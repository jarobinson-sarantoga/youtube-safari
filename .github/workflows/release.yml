name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run package
      - name: Upload plugin package
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="release/youtube-safari-$(node -p "require('./Info.json').version").iinaplgz"
          test -f "$asset"
          gh release upload "${{ github.event.release.tag_name }}" "$asset" --clobber
