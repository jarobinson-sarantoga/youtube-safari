name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  mac-audit:
    runs-on: [self-hosted, macOS, studio-m4-max, sarantoga, youtube-safari]
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Link plugin and run full audit
        run: |
          npm ci
          bash scripts/install.sh
          bash scripts/audit.sh
