name: Sarantoga finish

# Merges PRs started from Cursor web (or any PR labeled sarantoga) after CI passes.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finish:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge sarantoga PR when checks are green
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          REPO: ${{ github.repository }}
          SARANTOGA_NTFY_TOPIC: ${{ secrets.SARANTOGA_NTFY_TOPIC }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh run view "$RUN_ID" --repo "$REPO" --json headSha --jq .headSha)
          PR=$(gh pr list --repo "$REPO" --state open --json number,labels,headRefOid,isDraft \
            --jq ".[] | select(.headRefOid==\"$HEAD_SHA\") | select([.labels[].name] | index(\"sarantoga\")) | .number" | head -1)

          if [[ -z "$PR" ]]; then
            echo "No open sarantoga-labeled PR for this CI run."
            exit 0
          fi

          echo "Finishing PR #$PR"
          gh pr ready "$PR" --repo "$REPO" || true
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch

          ISSUE=$(gh pr view "$PR" --repo "$REPO" --json closingIssuesReferences --jq '.closingIssuesReferences[0].number // empty')
          if [[ -n "$ISSUE" ]]; then
            gh issue close "$ISSUE" --repo "$REPO" --comment "Merged in #${PR}." || true
          fi

          if [[ -n "${SARANTOGA_NTFY_TOPIC:-}" ]]; then
            curl -fsS -H "Title: Sarantoga — merged" -d "PR #${PR} merged to main." \
              "https://ntfy.sh/${SARANTOGA_NTFY_TOPIC}" || true
          fi
